<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>Anna CV Preview</title>
    <style>
        body { background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .cv-container { background: white; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; }
        .cv-image { max-width: 600px; width: 100%; height: auto; display: block; }
        .download-btn {
            margin-top: 25px; padding: 12px 30px; background-color: #7d5fff; color: white;
            text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s;
        }
        .download-btn:hover { background-color: #6741ff; transform: translateY(-2px); }
    </style>
</head>
<body>
    
    <div class="cv-container">
        <img src="Anna_CV.png" alt="Anna CV" class="cv-image">
    </div>
    
    <a href="Anna_CV.png" download="Anna_CV.png" class="download-btn">
        Download as Image/PDF
    </a>

</body>
</html>
